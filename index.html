<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <title>Mindful Dashboard</title>

    <!-- Compiled CSS file -->
     <link rel="stylesheet" href="/src/style.css">
    <!-- Transpiled JS -->
    <script src="/src/script.js" type="module" defer></script>
    

  </head>

<body class="min-h-screen flex justify-center items-center bg-gradient-to-br from-slate-900 via-purple-500 to-cyan-800">

    <main class="w-[90%] max-w-7xl grid grid-cols-9 grid-rows-7 gap-8">
                  <!-- TIme -->
        <section class=" flex col-span-5 row-span-4 bg-gradient-to-b from-slate-50 via-slate-200 to-sbg-gradient-to-b from-slate-50 via-slate-200 to-slate-300 p-4 border justify-center items-center text-7xl" role="region" aria-label="Time" >
          <time class="time">
            <span class="hours">HH</span>:<span class="minutes">MM</span>:<span class="seconds">SS</span>
            <span class="amOrPm ">AM/PM</span>
          </time>
        </section>
              <!-- Date -->
        <section class="bg-gradient-to-b from-slate-50 via-slate-200 to-slate-300 p-4 border col-span-4 row-span-3 flex justify-center items-center text-4xl" role="region" aria-label="Date">
          <time class="date">
            <span class="month">January</span>
            <span class="dayOfMonth">29</span>
            <span class="year">2024</span> 
            <span class="dayOfWeek">Monday</span>
          </time>
        </section>
            <!-- Event -->
        <section class="bg-gradient-to-b from-slate-50 via-slate-200 to-slate-300 p-4 border col-span-4 row-span-1 flex justify-center items-center text-4xl" role="region" aria-label="Days until event">
          <p>Days until graduation: <time class="daysUntilEvent">000</time></p>
        </section>

        <section class="bg-gradient-to-b from-slate-50 via-slate-200 to-slate-300 p-4 border col-span-5 row-span-3 grid grid-cols-5 grid-rows-3 place-items-center text-5xl gap-2 " role="region" aria-label="Gamble">
          <p class="col-span-5 row-span-1">Lets Go Gambling!!!</p>
            <div></div>
            <div class="slot-1 col-span-1 ">X</div>
            <div class="slot-2 col-span-1 ">X</div>
            <div class="slot-3 col-span-1 ">X</div>
            <button class="col-span-5 row-span-1 bg-amber-400 p-2 pl-6 pr-6 rounded-2xl"> Roll</button>
        </section>


        <section class="bg-gradient-to-b from-slate-50 via-slate-200 to-slate-300 p-4 border col-span-4 row-span-3 flex justify-center items-center text-6xl" role="region" aria-label="Age">
          <p>Age: <time class="ageOfPerson">000</time></p>
        </section>

    </main>
    
  </body>
</html>
